services:
  - type: web
    name: ai-todo-api
    runtime: node
    plan: free
    autoDeploy: true
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run start:server
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        sync: false
      - key: CORS_ORIGIN
        sync: false

